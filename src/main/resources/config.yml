scoreboards:
  titles: "Pillars"
  lobby:
    - ""
    - "<green>Players: <white>%pillars_arenaname%"
    - "<green>Arenas: <white>5"
    - "<aqua>Kills: <white>0"
    - ""
  waiting:
    - ""
    - "<green>Arena: <white>%pillars_arenaname%"
    - "<green>Needed: <white>%pillars_waitingplayers%/%pillars_minplayers%"
    - "<aqua>State: <white>Waiting..."
    - ""
  in-game:
    - ""
    - "<green>Arena: <white>${arena.name}"
    - "<aqua>Alive: <white>$"
    - "<yellow>Kills: <white>0"
    - ""

spawn:
  world: "world"
  x: 1
  y: 1
  z: 1
  yaw: 1
  pitch: 1

game:
  # Match length, in seconds.
  match-duration-seconds: 300
  # Pre-match countdown, in seconds.
  countdown-seconds: 10
  # How often (in seconds) each alive player receives a random item.
  random-item-interval-seconds: 3.5
  # Velocity multiplier applied to the victim when the "knockback" event is active.
  knockback-multiplier: 2.0
  # How often (in seconds) the lava rises when the "lava" event is active.
  lava-rise-interval-seconds: 4
  border:
    # Border size (in blocks) at which the shrink stops.
    final-size: 10.0
    # How often (in seconds) the border shrinks when the "border" event is active.
    shrink-interval-seconds: 7
    # Damage dealt per second to players outside the border.
    damage-amount: 3.0
  # Votes only make an event more likely, they never guarantee it: after the vote, one option
  # (including "no event") is picked at random, weighted by how many votes it received.
  events:
    lava:
      # If disabled, this event can't be voted for or picked, even with votes.
      enabled: true
    knockback:
      enabled: true
    border:
      enabled: true
    # Weight every option (including "no event") starts with before votes are counted, so an
    # option can still be picked with zero votes. Set to 0 to require at least one vote.
    base-weight: 1.0
    # Extra weight added per vote received.
    vote-weight: 1.0
  # Slot-machine style animation played once the vote closes, right before the match starts.
  event-selection-animation:
    enabled: true
    # How many names scroll by before landing on the picked event.
    scroll-count: 16
    # Delay (in ticks) between scrolled names at the start/end of the animation; it gradually
    # slows down from the start value to the end value for a "landing" effect.
    scroll-interval-start-ticks: 2
    scroll-interval-end-ticks: 7
    # Sound played for each scrolled name. See https://jd.papermc.io/paper/1.21/org/bukkit/Sound.html
    scroll-sound: BLOCK_NOTE_BLOCK_PLING
    scroll-sound-volume: 0.6
    scroll-sound-pitch: 1.4
    # Sound played once when the picked event is revealed.
    reveal-sound: BLOCK_NOTE_BLOCK_PLING
    reveal-sound-volume: 1.0
    reveal-sound-pitch: 2.0
    # How long (in ticks) the reveal stays on screen before the match actually starts.
    reveal-hold-ticks: 40

# Items given to players standing in the lobby (hotbar slots 0-8).
# Add, remove or reorder entries freely; each key is just an internal id.
# "command" is optional: leave it empty ("") for an item that does nothing when clicked.
lobby-items:
  mode-selector:
    slot: 4
    material: COMPASS
    name: "<gold>✩ <white><bold>Mode Selector <gold>✩"
    lore:
      - "<gray>Click to choose a game mode"
    command: "dm open serverselector"
  cosmetics:
    slot: 6
    material: EMERALD
    name: "<gold>✩ <white><bold>Cosmetics <gold>✩"
    lore:
      - "<gray>Customize your appearance"
    command: ""
  casual-match:
    slot: 2
    material: NETHER_STAR
    name: "<gold>✩ <white><bold>Casual Match <gold>✩"
    lore:
      - "<gray>Join the best available arena"
    command: "joinrandom"

# Slot and material for the two items given to players in an arena's waiting
# room. Their name/lore come from language.yml (items.waiting.*) since what
# they do (open the vote menu / leave the arena) is fixed.
waiting-items:
  vote:
    slot: 0
    material: PAPER
  leave:
    slot: 8
    material: RED_DYE
