#{player} Winner/Player
#{target} Target

prefix:
  game: "<bold><aqua>Game </bold><gray>|"
  party: "<bold><green>Party </bold><gray>|"

game:
  end-game:
    - "<gray>--------------------------"
    - "<dark_gray>•<gray> Game length: <yellow>{time}"
    - "<dark_gray>•<gray> Kills: <yellow>{kills}"
    - "<dark_gray>•<gray> Map: <yellow>{map}"
    - "<gray>--------------------------"
    - "<hover:show_text:'<green>Start a new game'><click:run_command:/joinrandom><gray>Click Here to <green>play again"
    - "<gray>--------------------------"
  win-game:
    - "<gray>--------------------------"
    - "<yellow>{winner} <green>has won the game!"
    - "<gray>--------------------------"


arena:
  join: "{prefix_game} <white>{player} <yellow>joined (<green>{on}<white>/<green>{max}<yellow>)"
  leave: "{prefix_game} <red>You left this arena"
  player-left: "{prefix_game} <green>${player} <yellow>left the game"
  player-needed: "{prefix_game} <green><yellow>{playerRequired}<green> more player(s) needed to start"
  player-eliminated: "{prefix_game} <yellow><green>{player}</green> was eliminated</yellow>"
  player-eliminated-fall: "{prefix_game} <yellow><green>{player}</green> fell</yellow>"
  player-eliminated-kill: "{prefix_game} <yellow><green>{player}</green> was eliminated by <green>{killer}</green></yellow>"
  player-eliminated-void-attack: "{prefix_game} <yellow><green>{player}</green> was knocked into the void by <green>{killer}</green></yellow>"
  player-eliminated-void: "{prefix_game} <yellow><green>{player}</green> fell into the void</yellow>"
  player-eliminated-mob: "{prefix_game} <yellow><green>{player}</green> was killed by <green>{killer}</green></yellow>"
  event-selected: "{prefix_game} <gray>Event: <yellow>{event}"
  errors:
    already-in-game: "{prefix_game} <red>You are already in this arena"
    arena-not-ready: "{prefix_game} <red>Arena not ready"
    the-game-is-full: "{prefix_game} <red>Game is full!"
    limit-reached: "{prefix_game} <red>Limit reached"

  title:
    start-title: "<gray>Kill your opponents"
    start-subtitle: "<dark_gray>But don't fall..."
    end-title: "<green>Game over!"
    end-subtitle: "<yellow>{winner} <white>has won"
    countdown-other: "<green>{number}</green>"
    countdown-5: "<yellow>{number}</yellow>"
    countdown-4: "<yellow>{number}</yellow>"
    countdown-3: "<yellow>{number}</yellow>"
    countdown-2: "<red>{number}</red>"
    countdown-1: "<red>{number}</red>"
    event-select-subtitle: "<gray>Selecting event..."
    event-reveal-subtitle: "<green>Event selected!"

  vote:
    classic-voted: "{prefix_game} <green>{player} voted for a <yellow><bold>classic</bold></yellow> game"
    lava-voted: "{prefix_game} <green>{player} voted for the <yellow><bold>lava</bold></yellow> event"
    knockback-voted: "{prefix_game} <green>{player} voted for the <yellow><bold>knockback</bold></yellow> event"
    border-voted: "{prefix_game} <green>{player} voted for the <yellow><bold>Border</bold></yellow> event"
    night-voted: "{prefix_game} <green>{player} voted for <yellow><bold>night</bold></yellow>"
    day-voted: "{prefix_game} <green>{player} voted for <yellow><bold>day</bold></yellow>"
    already-voted-event: "{prefix_game} <red>You already voted for an event!"
    already-voted-time: "{prefix_game} <red>You already voted for the time!"
    event-disabled: "{prefix_game} <red>This event is disabled"

items:
  waiting:
    vote-name: "<green>Vote!"
    vote-lore: ""
    leave-name: "<red>Leave"
    leave-lore: ""

party:
  party-created: "{prefix_party} <yellow>You created a party!"
  party-invited: "{prefix_party} <yellow>You invited <white>${player}</white> to the party</yellow>"
  party-invite-receive:
    - "{prefix_party} <yellow>You were invited to the party by <white>{player}</white>, click to accept</yellow>"
    - "<hover:show_text:'<white>/party accept'><click:run_command:/party accept><green><bold>ACCEPT"
  party-disband: "{prefix_party} <yellow>The party has been disbanded"
  party-leave:  "{prefix_party} <yellow>You left the party"
  player-joined: "{prefix_party} You joined <white>${player}'s</white> party"
  player-joined-broadcast: "{prefix_party} <white>{player} <yellow>joined the party!"
  party-promote: "{prefix_party} <green>You were promoted to party owner"
  user-left-party: "{prefix_party} <white>{player} <yellow>left the party!"
  party-promote-broadcast: "{prefix_party} <white>{player} <yellow>is the new party owner!"
  party-public: "{prefix_party} <green>Your party is now public! Anyone can join with <yellow>/party join {player}</yellow>"
  party-private: "{prefix_party} <yellow>Your party is now private"
  party-broadcast:
    - "{prefix_party} <yellow>{player}'s party is looking for members!"
    - "<hover:show_text:'<white>/party join {player}'><click:run_command:/party join {player}><green><bold>CLICK HERE TO JOIN"
  party-info:
    - "<gradient:#c061cb:#3584e4>✦━━━ PARTY INFO ━━━✦</gradient>"
    - "<gray>Admin:</gray> <yellow>{partyAdmin}</yellow>"
    - "<gradient:#c061cb:#3584e4>✦━━━━━━━━━━━━━━━━━━✦</gradient>"
    - "<gray>Members: {members}</gray>"
    - ""
    - "<gradient:#c061cb:#3584e4>✦━━━━━━━━━━━━━━━━━━✦</gradient>"
  party-info-no-members:
    - "<gradient:#c061cb:#3584e4>✦━━━ PARTY INFO ━━━✦</gradient>"
    - "<gray>Admin:</gray> <yellow>{partyAdmin}</yellow>"
    - ""
    - "<gradient:#c061cb:#3584e4>✦━━━━━━━━━━━━━━━━━━✦</gradient>"
  command-help:
    - ""
    - "<gradient:#c061cb:#3584e4>━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
    - "<bold><gradient:#00ff99:#00ccff>Party Commands</gradient></bold>"
    - ""
    - "<gold>/party create</gold> <gray>- <yellow>Create the party</yellow>"
    - "<gold>/party invite <player></gold> <gray>- <yellow>Invite a player</yellow>"
    - "<gold>/party accept</gold> <gray>- <yellow>Accept an invite</yellow>"
    - "<gold>/party leave</gold> <gray>- <yellow>Leave the party</yellow>"
    - "<gold>/party disband</gold> <gray>- <yellow>Disband the party</yellow>"
    - "<gold>/party remove <player></gold> <gray>- <yellow>Remove a member</yellow>"
    - "<gold>/party promote <player></gold> <gray>- <yellow>Promote a member to admin</yellow>"
    - "<gold>/party info</gold> <gray>- <yellow>Party info</yellow>"
    - "<gold>/party join <player></gold> <gray>- <yellow>Join a public party</yellow>"
    - "<gold>/party public</gold> <gray>- <yellow>Make your party public</yellow>"
    - "<gold>/party private</gold> <gray>- <yellow>Make your party private</yellow>"
    - "<gold>/party broadcast</gold> <gray>- <yellow>Invite everyone to join</yellow>"
    - ""
    - "<gradient:#c061cb:#3584e4>━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
    - ""
  errors:
    user-already-in-party: "{prefix_party} <red>You are already in a party"
    cant-invite-yourself: "{prefix_party} <red>You can't invite yourself"
    no-party-request: "{prefix_party} <red>You have no pending request"
    player-not-in-party:
      - "{prefix_party} <red>You are not in a party"
      - "<hover:show_text:'<white>/party create'><click:run_command:/party create><green><bold>CREATE A PARTY"
    max-party-member: "{prefix_party} <red>The party is full! (max {max} members)"
    not-party-admin: "{prefix_party} <red>You are not the party owner!"
    user-in-party: "{prefix_party} <red>This user is already in a party"
    not-in-party: "{prefix_party} <red>You are not in a party"
    not-the-owner: "{prefix_party} <red>You are not the party owner"
    already-in-party: "{prefix_party} <red>You are already in a party"
    target-not-in-party: "{prefix_party} <white>{player} <red>is not in the party"
    party-invite-expired: "{prefix_party} <red>The party invite has expired"
    target-has-no-party: "{prefix_party} <red>{player} is not in a party"
    party-not-public: "{prefix_party} <red>This party is not public"
    no-public-permission: "{prefix_party} <red>You don't have permission to create a public party"
    already-public: "{prefix_party} <red>Your party is already public"
    already-private: "{prefix_party} <red>Your party is already private"

gui:
  # Vote GUI text/icons/layout live in config.yml (gui.vote) instead.
  stats:
    title: "<light_purple>Player Statistics"
    item-filler-name: "<gray>────</gray>"
    wins-name: "<gray>Wins</gray>"
    wins-lore: "<yellow>{wins}</yellow>"
    kills-name: "<gray>Kills</gray>"
    kills-lore: "<yellow>{kills}</yellow>"
    defeats-name: "<gray>Defeats</gray>"
    defeats-lore: "<yellow>{defeats}</yellow>"
    gamesplayed-name: "<gray>Games played</gray>"
    gamesplayed-lore: "<yellow>{gamesPlayed}</yellow>"
    winstreak-name: "<gray>WinStreak</gray>"
    winstreak-lore: "<yellow>{winStreak}</yellow>"

stats:
  stats-user:
    - "<gradient:#c061cb:#3584e4>✦━━━━━ Stats ━━━━━✦</gradient>"
    - ""
    - "<gray>Player:</gray> <yellow>{player}</yellow>"
    - "<gray>Defeats:</gray> <yellow>{defeats}</yellow>"
    - "<gray>Kills:</gray> <yellow>{kills}</yellow>"
    - "<gray>Wins:</gray> <yellow>{wins}</yellow>"
    - "<gray>Games Played:</gray> <yellow>{gamesPlayed}</yellow>"
    - "<gray>XP:</gray> <yellow>{xp}</yellow>"
    - "<gray>Level:</gray> <yellow>{level}</yellow>"
    - ""
    - "<gradient:#c061cb:#3584e4>✦━━━━━━━━━━━━━━━━✦</gradient>"
  stats-target:
    - ""
    - "<gradient:#ffcc00:#ff6699>✦━━━━━━━━━━━━━━━━━━━━━━━✦</gradient>"
    - "<bold><gradient:#00ff99:#00ccff>Player Statistics</gradient></bold>"
    - ""
    - "<yellow>Player</yellow> <gray>»</gray> <green>{player}</green>"
    - "<yellow>Defeats</yellow> <gray>»</gray> <red>{defeats}</red>"
    - "<yellow>Kills</yellow> <gray>»</gray> <green>{kills}</green>"
    - "<yellow>Wins</yellow> <gray>»</gray> <aqua>{wins}</aqua>"
    - "<yellow>Games Played</yellow> <gray>»</gray> <gold>{gamesPlayed}</gold>"
    - "<yellow>XP</yellow> <gray>»</gray> <light_purple>{xp}</light_purple>"
    - "<yellow>Level</yellow> <gray>»</gray> <blue>{level}</blue>"
    - ""
    - "<gradient:#ff6699:#ffcc00>✦━━━━━━━━━━━━━━━━━━━━━━━✦</gradient>"
    - ""

level:
  title: "<gold><bold>Level Up!"
  subtitle: "<yellow>You reached level {level}"

join-leave-cmd:
  errors:
    arena-editing: "{prefix_game} <red>An operator is editing the arena, you can't play"
    arena-not-exist: "{prefix_game} <red>Arena does not exist"
    arena-not-available: "{prefix_game} <red>No arenas available to join"
    not-in-arena: "{prefix_game} <red>You are not in an arena"
    user-in-party: "{prefix_game} <red>You can't join a game because you are in a party!"
    already-best-arena: "{prefix_game} <green>You are already in the best arena"
    wait: "{prefix_game} <red>Wait a few seconds"
    party-too-big-for-arena: "{prefix_game} <red>Your party ({size}) doesn't fit in this arena ({available} slot(s) available)"

spectate-cmd:
  joined-arena: "{prefix_game} <green>You are now spectating <yellow>{arena}</yellow>"
  joined-player: "{prefix_game} <green>You are now spectating <yellow>{player}</yellow> in <yellow>{arena}</yellow>"
  left: "{prefix_game} <red>You are no longer spectating"
  match-ended: "{prefix_game} <red>The match ended, you were sent back to the lobby"
  chat-format: "<dark_gray>[<gray>SPEC<dark_gray>]</dark_gray> <white>{player}</white><gray>:</gray> <white>{message}</white>"
  errors:
    not-found: "{prefix_game} <red>No online player or in-game arena found with that name"
    not-in-game: "{prefix_game} <red>That arena's match hasn't started yet"
    already-in-game: "{prefix_game} <red>You must leave your current match before spectating"
    already-spectating: "{prefix_game} <red>You are already spectating, use /leave first"

scoreboard:
  lobby:
    title: "<bold><red><#f6f5f4>Pillars Of Fortune"
    lines:
      - ""
      - "<#c061cb>Players: <#f6f5f4>%pillars_playersinmatch%"
      - "<#c061cb>Arenas: <#f6f5f4>%pillars_arenacount%"
      - "<#c061cb>Kills: <#f6f5f4>%pillars_kills%"
      - ""

  waiting:
    title: "<bold><red><#f6f5f4>Pillars Of Fortune"
    lines:
      - ""
      - "<#c061cb>State"
      - "<#f6f5f4>Waiting..."
      - ""
      - "<#c061cb>Players:"
      - "<#cf6f5f4>(%pillars_waitingplayers%/%pillars_minplayers%)"
      - ""
      - "<#77767b>Map: %pillars_arenaname%"

  playing:
    title: "<bold><red><#f6f5f4>Pillars Of Fortune"
    lines:
      - ""
      - "<#c061cb>Time: <#f6f5f4>%pillars_time%"
      - "<#c061cb>Alive: <#f6f5f4>%pillars_aliveplayers%"
      - "<#c061cb>Kills: <#f6f5f4>%pillars_ingamekills%"
      - ""
      - "<#77767b>Map: %pillars_arenaname%"


